<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cookie Clicker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"/>
    <script src="logic.js" type="module"></script>
    <script src="firebaseauth.js" type="module"></script>
</head>
<body>
    <div class="auth-container">
        <div class="container" id="container">
            <div class="form-container sign-up-container">
                <form action="#">
                    <h1>Create Account</h1>
                    <div class="social-container">
                        <button class="social-btn" type="button" href="#" class="social"><i class="fab fa-facebook-f"></i></button>
                        <button class="social-btn" type="button" href="#" class="social" id="googleSignUpBtn"><i class="fab fa-google-plus-g"></i></button>
                        <button class="social-btn" type="button" href="#" class="social"><i class="fab fa-linkedin-in"></i></button>
                    </div>
                    <span>or use your email for registration</span>
                    <input type="text" placeholder="Name" id="signUpName" />
                    <input type="email" placeholder="Email" id="signUpEmail" />
                    <input type="password" placeholder="Password" id="signUpPassword" />
                    <div class="error-message" id="signUpError"></div>
                    <button type="button" id="signUpButton">Sign Up</button>
                </form>
            </div>
            <div class="form-container sign-in-container">
                <form action="#">
                    <h1>Sign in</h1>
                    <div class="social-container">
                        <button class = "social-btn" href="#" class="social"><i class="fab fa-facebook-f"></i></button>
                        <button class = "social-btn" type="button" href="#" class="social" id="googleSignInBtn"><i class="fab fa-google-plus-g"></i></button>
                        <button class = "social-btn" href="#" class="social"><i class="fab fa-linkedin-in"></i></button>
                    </div>
                    <span>or use your account</span>
                    <input type="email" placeholder="Email" id="signInEmail" />
                    <input type="password" placeholder="Password" id="signInPassword" />
                    <a href="#">Forgot your password?</a>
                    <div class="error-message" id="signInError"></div>
                    <button type="button" id="signInButton">Sign In</button>
                </form>
            </div>
            <div class="overlay-container">
                <div class="overlay">
                    <div class="overlay-panel overlay-left">
                        <h1>Welcome Back!</h1>
                        <p>To keep connected with us please login with your personal info</p>
                        <button class="ghost" id="signIn">Sign In</button>
                    </div>
                    <div class="overlay-panel overlay-right">
                        <h1>Hello, Friend!</h1>
                        <p>Enter your personal details and start journey with us</p>
                        <button class="ghost" id="signUp">Sign Up</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
